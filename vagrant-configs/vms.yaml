---
vms:

  # Open-source Puppetserver master
  - box: bento/centos-7
    hostname: master.vagrant
    name: master
    roles:
      - symlink-puppet-code-to-production
      - puppetserver
      - base

  # Open-source Puppet agent
  - box: bento/centos-7
    hostname: agent1.vagrant
    name: agent1
    roles:
      - puppet-agent
      - base
